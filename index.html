<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#080E1A;color:#F1F5F9;font-family:'DM Sans',Arial,sans-serif}
html:has(body.light-mode){background:#F0F4F8}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.2);border-radius:4px}
input,select,textarea{font-family:'DM Sans',Arial,sans-serif;color-scheme:dark;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:9px 12px;color:#F1F5F9;font-size:13px;outline:none;width:100%;box-sizing:border-box;resize:vertical}
input:focus,select:focus,textarea:focus{border-color:rgba(245,158,11,0.5)}
option{background:#0D1526}
button{cursor:pointer;font-family:'DM Sans',Arial,sans-serif}
.card{background:rgba(13,21,38,0.95);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:20px}
.badge{display:inline-block;border-radius:6px;padding:2px 10px;font-size:11px;font-weight:700;letter-spacing:.4px;white-space:nowrap;border:1px solid}
.btn-primary{background:linear-gradient(135deg,#F59E0B,#EF4444);border:none;border-radius:10px;color:#fff;padding:10px 18px;font-size:13px;font-weight:800}
.btn-ghost{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#94A3B8;padding:6px 14px;font-size:12px;font-weight:700}
.row-hover{transition:background .15s}
.row-hover:hover{background:rgba(255,255,255,0.05)!important}
.tab-btn{border-radius:8px;padding:6px 12px;font-size:11px;font-weight:700;white-space:nowrap;transition:all .15s}
.section-title{font-size:11px;font-weight:800;color:#64748B;letter-spacing:.8px;text-transform:uppercase;margin-bottom:14px;font-family:Arial Black,sans-serif}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-box{background:#0D1526;border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:24px;width:100%;max-height:92vh;overflow-y:auto;position:relative}
#header{background:rgba(13,21,38,.97);border-bottom:1px solid rgba(255,255,255,.07);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:60px;backdrop-filter:blur(20px);position:sticky;top:0;z-index:100}
#main{padding:20px;max-width:1280px;margin:0 auto}
.stat-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:14px 16px;flex:1;min-width:90px}
.phase-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;display:inline-block}
.pbar-track{background:rgba(255,255,255,.07);border-radius:4px;height:5px;overflow:hidden;width:100%}
.pbar-fill{height:100%;border-radius:4px;transition:width .5s ease}
.timeline-line{position:absolute;left:20px;top:0;bottom:0;width:2px;background:rgba(255,255,255,.08);border-radius:2px}
/* ERC Matrix */
.erc-cell{border-radius:8px;padding:10px 6px;min-width:68px;text-align:center;cursor:pointer;transition:all .15s}
.erc-cell:hover{transform:scale(1.04)}
/* Install banner */
#install-banner{display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#F59E0B,#EF4444);color:#fff;padding:12px 24px;border-radius:12px;font-size:13px;font-weight:800;cursor:pointer;z-index:9999;box-shadow:0 8px 32px rgba(245,158,11,.4);white-space:nowrap}

body.light-mode{background:#F0F4F8;color:#1E293B}
html body.light-mode{background:#F0F4F8!important}
body.light-mode::before{content:'';position:fixed;inset:0;background:#F0F4F8;z-index:-1}
body.light-mode #header{background:rgba(255,255,255,0.97);border-bottom:1px solid rgba(0,0,0,0.08)}
body.light-mode #header *{color:#1E293B!important}
body.light-mode .tab-btn{color:#475569!important;border-color:transparent!important}
body.light-mode .card{background:#FFF;border:1px solid rgba(0,0,0,0.08);box-shadow:0 2px 8px rgba(0,0,0,0.06)}
body.light-mode .card *{color:#1E293B}
body.light-mode .stat-card{background:#FFF;border:1px solid rgba(0,0,0,0.08)}
body.light-mode .stat-card *{color:#1E293B!important}
body.light-mode .modal-box{background:#FFF;border:1px solid rgba(0,0,0,0.1)}
body.light-mode .modal-box{background:#F8FAFC!important}
body.light-mode .modal-overlay{background:rgba(0,0,0,0.5)}
body.light-mode input,body.light-mode select,body.light-mode textarea{background:#F8FAFC;border:1px solid rgba(0,0,0,0.15);color:#1E293B}
body.light-mode option{background:#FFF;color:#1E293B}
body.light-mode .pbar-track{background:rgba(0,0,0,0.08)!important}
body.light-mode .section-title{color:#334155!important}
body.light-mode .row-hover:hover{background:rgba(0,0,0,0.03)!important}
body.light-mode .timeline-line{background:rgba(0,0,0,0.1)!important}
body.light-mode #due-popup{background:#FFF!important;border-color:rgba(245,158,11,0.3)!important;box-shadow:0 8px 32px rgba(0,0,0,0.12)!important}
body.light-mode #due-popup *{color:#1E293B!important}
body.light-mode #view-trend,
body.light-mode #view-dashboard,
body.light-mode #view-cases{background:#F0F4F8}
/* Fix semua background gelap di light mode */
body.light-mode [style*="background:#0D1526"],
body.light-mode [style*="background:#0F172A"],
body.light-mode [style*="background:#080E1A"],
body.light-mode [style*="background:#1E293B"]{background:#F8FAFC!important}
body.light-mode [style*="background:rgba(255,255,255,0.02)"]{background:rgba(0,0,0,0.02)!important}
body.light-mode [style*="background:rgba(255,255,255,0.03)"]{background:rgba(0,0,0,0.03)!important}
body.light-mode [style*="background:rgba(255,255,255,0.04)"]{background:rgba(0,0,0,0.04)!important}
body.light-mode [style*="background:rgba(255,255,255,0.05)"]{background:rgba(0,0,0,0.05)!important}
body.light-mode [style*="background:rgba(255,255,255,0.06)"]{background:rgba(0,0,0,0.05)!important}
body.light-mode [style*="background:rgba(255,255,255,0.07)"]{background:rgba(0,0,0,0.05)!important}
body.light-mode [style*="background:rgba(255,255,255,0.08)"]{background:rgba(0,0,0,0.06)!important}
body.light-mode [style*="background:rgba(13,21,38"]{background:#F8FAFC!important}
/* Fix border warna gelap */
body.light-mode [style*="border:1px solid rgba(255,255,255"]{border-color:rgba(0,0,0,0.08)!important}
/* Fix teks putih */
body.light-mode [style*="color:#E2E8F0"]{color:#1E293B!important}
body.light-mode [style*="color:#F1F5F9"]{color:#0F172A!important}
body.light-mode [style*="color:#CBD5E1"]{color:#334155!important}
body.light-mode [style*="color:#94A3B8"]{color:#64748B!important}
body.light-mode [style*="color:#475569"]{color:#334155!important}
/* SVG chart */
body.light-mode svg text{fill:#334155!important}
body.light-mode svg line{stroke:rgba(0,0,0,0.08)!important}

#login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#000000 0%,#0a1a0a 30%,#0d2b0d 60%,#001a00 100%);display:flex;align-items:center;justify-content:center;z-index:9999;overflow:hidden}
#login-screen::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(0,166,81,0.15) 0%,transparent 50%),radial-gradient(ellipse at 80% 50%,rgba(255,215,0,0.08) 0%,transparent 50%);pointer-events:none}
.login-box{position:relative;z-index:10;text-align:center;padding:48px 40px;max-width:420px;width:100%;background:rgba(0,20,0,0.6);border:1px solid rgba(255,215,0,0.2);border-radius:24px;backdrop-filter:blur(20px);box-shadow:0 0 60px rgba(0,166,81,0.15);animation:loginFadeIn 0.8s ease}
@keyframes loginFadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.login-logo{width:160px;height:160px;margin:0 auto 24px;filter:drop-shadow(0 0 20px rgba(255,215,0,0.4));animation:logoPulse 3s ease-in-out infinite;border-radius:50%}
@keyframes logoPulse{0%,100%{filter:drop-shadow(0 0 20px rgba(255,215,0,0.4))}50%{filter:drop-shadow(0 0 30px rgba(255,215,0,0.6))}}
.login-title{font-family:Arial Black,sans-serif;font-size:22px;font-weight:900;color:#FFD700;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.login-subtitle{font-size:11px;color:rgba(0,166,81,0.8);letter-spacing:2px;text-transform:uppercase;margin-bottom:32px;font-weight:700}
.login-divider{width:60px;height:2px;background:linear-gradient(90deg,transparent,#FFD700,transparent);margin:0 auto 28px}
.login-input{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,215,0,0.2);border-radius:10px;padding:13px 16px;color:#F1F5F9;font-size:14px;outline:none;text-align:center;letter-spacing:3px;font-family:'DM Mono',monospace;transition:all 0.3s;box-sizing:border-box;margin-bottom:16px}
.login-input:focus{border-color:rgba(255,215,0,0.5);box-shadow:0 0 20px rgba(255,215,0,0.1)}
.login-btn{width:100%;background:linear-gradient(135deg,#00A651,#006B35);border:1px solid rgba(255,215,0,0.3);border-radius:10px;color:#FFD700;padding:13px;font-size:13px;font-weight:800;cursor:pointer;letter-spacing:1.5px;text-transform:uppercase;font-family:Arial Black,sans-serif}
.login-error{color:#EF4444;font-size:12px;margin-top:12px;display:none}
.login-footer{margin-top:28px;font-size:10px;color:rgba(255,215,0,0.3);letter-spacing:1px;text-transform:uppercase}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

// ── DUE DATE NOTIFICATIONS ─────────────────────────────────────────────────────
var _duePopupOpen=false;
function checkDueDates(){
  var now=new Date();
  var alerts=[];
  cases.forEach(function(c){
    (c.mitigations||[]).forEach(function(m){
      if(m.status==="Closed"||!m.dueDate) return;
      var due=new Date(m.dueDate);
      var diff=Math.ceil((due-now)/(1000*60*60*24));
      if(diff<=7) alerts.push({caseId:c.id,caseTitle:c.title,action:m.action,dueDate:m.dueDate,diffDays:diff,overdue:diff<0});
    });
    (c.safetyRecs||[]).forEach(function(r){
      if(r.status==="Closed"||!r.targetDate) return;
      var due=new Date(r.targetDate);
      var diff=Math.ceil((due-now)/(1000*60*60*24));
      if(diff<=7) alerts.push({caseId:c.id,caseTitle:c.title,action:r.recommendation,dueDate:r.targetDate,diffDays:diff,overdue:diff<0,isRec:true});
    });
  });
  var badge=document.getElementById("due-badge");
  if(badge){ if(alerts.length>0){badge.textContent=alerts.length;badge.style.display="block";}else{badge.style.display="none";} }
  var list=document.getElementById("due-list");
  if(list){
    if(alerts.length===0){
      list.innerHTML='<div style="text-align:center;color:#64748B;font-size:12px;padding:16px 0">✅ Tidak ada due date mendesak</div>';
    } else {
      list.innerHTML=alerts.sort(function(a,b){return a.diffDays-b.diffDays;}).map(function(a){
        var col=a.overdue?'#EF4444':a.diffDays<=3?'#F97316':'#F59E0B';
        var lbl=a.overdue?('OVERDUE '+Math.abs(a.diffDays)+'d'):a.diffDays===0?'Due TODAY':('Due in '+a.diffDays+'d');
        var d='<div data-caseid="'+a.caseId+'" style="padding:10px 12px;background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.15);border-radius:8px;margin-bottom:8px;cursor:pointer">';
        d+='<div style="display:flex;justify-content:space-between;margin-bottom:4px">';
        d+='<span style="font-size:10px;font-weight:800;color:'+col+';padding:2px 7px;border-radius:4px">'+lbl+'</span>';
        d+=(a.isRec?'<span style="font-size:9px;color:#8B5CF6;font-weight:700">Rec</span>':'<span style="font-size:9px;color:#F59E0B;font-weight:700">Mit</span>');
        d+='</div>';
        d+='<div style="font-size:11px;color:"+cPrimary()+";font-weight:600;margin-bottom:2px">'+esc(a.caseTitle)+'</div>';
        d+='<div style="font-size:10px;color:#64748B">'+esc(a.action.substring(0,55))+(a.action.length>55?'...':'')+'</div>';
        d+='<div style="font-size:9px;color:#475569;margin-top:3px">Due: '+a.dueDate+'</div></div>';
        return d;
      }).join('');
    }
  }
}
document.addEventListener('click',function(e){

    if(cid){toggleDuePopup();openCase(cid);}

});
function toggleDuePopup(){

function deleteFromFirestore(id){ if(window._fbDB){window._fbDB.collection("cases").doc(id).delete().catch(function(e){console.warn("Del failed",e);});} }
function startFirestoreSync(){
  if(!window._fbDB){showSyncStatus("💾 Lokal","#64748B");return;}
  showSyncStatus("🔄 Connecting...","#F59E0B");
  window._fbDB.collection("cases").onSnapshot(function(snap){
    cases=snap.docs.map(function(d){return d.data();});
    cases.sort(function(a,b){return (b.date||"").localeCompare(a.date||"");});
    try{localStorage.setItem("citilink_safety_v1",JSON.stringify(cases));}catch(e){}
    showSyncStatus("✅ Synced · "+cases.length+" kasus","#10B981");
    // Re-sync view display state before rendering
    ["dashboard","trend","cases"].forEach(function(n){
      var el=document.getElementById("view-"+n);
      if(el) el.style.display=(currentView===n)?"block":"none";
    });
    renderAll();
    if(selectedCaseId) renderCaseModal();
  },function(err){console.warn("Firestore error:",err);showSyncStatus("⚠️ Offline","#F59E0B");});
}

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────
function genId(){ return "INV-"+new Date().getFullYear()+"-"+String(Math.floor(Math.random()*900)+100); }
function genUid(){ return Date.now()+"-"+Math.floor(Math.random()*9999); }
function today(){ return new Date().toISOString().split("T")[0]; }
function phaseIdx(p){ return PHASES.indexOf(p); }
function isOverdue(d){ return d && new Date(d)<new Date() && d!==today(); }
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function getCase(id){ return cases.find(c=>c.id===id); }
function updateCase(id, patch){
  cases = cases.map(c => c.id===id ? {...c,...patch} : c);
  var updated = cases.find(c=>c.id===id);
  if(updated) saveCase(updated); else saveData();
}

function badge(label, cfg){
  if(!cfg) cfg={color:"#94A3B8",bg:"rgba(148,163,184,0.15)"};
  return `<span class="badge" style="color:${cfg.color};background:${cfg.bg};border-color:${cfg.color}40">${esc(label)}</span>`;
}
function pbar(value, color){
  color=color||"#F59E0B";
  return `<div class="pbar-track"><div class="pbar-fill" style="width:${value}%;background:${color}"></div></div>`;
}
function phaseBar(phase){
  const cur=phaseIdx(phase);
  let h='<div style="display:flex;align-items:center">';
  for(let i=0;i<PHASES.length;i++){
    const bg=i<cur?"#10B981":i===cur?"#F59E0B":"rgba(255,255,255,0.1)";
    const border=i===cur?"border:2px solid #F59E0B;width:11px;height:11px":"width:9px;height:9px";
    h+=`<div title="${esc(PHASES[i])}" style="flex-shrink:0;border-radius:50%;background:${bg};${border}"></div>`;
    if(i<PHASES.length-1){
      const lc=i<cur?"#10B981":"rgba(255,255,255,0.07)";
      h+=`<div style="flex:1;height:2px;background:${lc};min-width:6px"></div>`;
    }
  }
  h+='</div>';
  return h;
}

function openCase(id){
  selectedCaseId=id;
  selectedTab="detail";
  renderCaseModal();
  document.getElementById("modal-case").style.display="flex";
}
function closeCaseModal(){
  document.getElementById("modal-case").style.display="none";
  selectedCaseId=null;
  renderAll();
}

function renderCaseModal(){
  const c=getCase(selectedCaseId);
  if(!c) return;
  const ercScore=c.risk?.riskIdx!=null&&c.risk?.barrierIdx!=null?ERC_MATRIX[c.risk.riskIdx][c.risk.barrierIdx]:null;
  const sc=STATUS_CFG[c.status]||STATUS_CFG["Data Collection"];
  const od=(c.mitigations||[]).filter(m=>m.status!=="Closed"&&isOverdue(m.dueDate)).length;
  const TABS=[
    ["detail","📋 Detail",""],
    ["rca","🔍 RCA",c.rca?.rootCause?"✓":""],
    ["risk","⚠️ Risk",ercScore?ercScore:""],
    ["timeline","⏱ Timeline",(c.timeline||[]).length||(c.timeline||[]).length===0?"":c.timeline.length],
    ["mitigation","🛡 Mitigation",(c.mitigations||[]).length||""],
    ["safetyRec","📨 Safety Rec",(c.safetyRecs||[]).length||""],
    ["lessons","💡 Lessons",c.lessons?.trim()?"✓":""],
    ["phase","🔄 Phase",""],
    ["evidence","📁 Evidence",(c.evidence||[]).length||""],
  ];

  let tabHtml=TABS.map(([t,l,b])=>`<button class="tab-btn" onclick="setTab('${t}')" style="background:${selectedTab===t?"rgba(245,158,11,0.15)":"transparent"};border:1px solid ${selectedTab===t?"#F59E0B":"rgba(255,255,255,0.08)"};color:${selectedTab===t?"#F59E0B":"#64748B"}">${l}${b?`<span style="margin-left:4px;background:rgba(255,255,255,0.1);border-radius:4px;padding:0 5px;font-size:10px">${b}</span>`:""}</button>`).join("");

  let content=renderTab(c);

  document.getElementById("modal-case").innerHTML=`<div class="modal-box" style="max-width:760px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
      <div>
        <div style="font-size:10px;color:#64748B;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:3px;font-family:'DM Mono',monospace">${esc(c.id)}</div>
        <h2 style="margin:0;font-size:17px;font-weight:800;color:${cPrimary()};font-family:Arial Black,sans-serif;line-height:1.3;max-width:520px">${esc(c.title)}</h2>
        <div style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;align-items:center">
          ${badge(c.status,sc)}
          <span style="font-size:11px;color:${SEV_COLOR[c.severity]||"#94A3B8"};font-weight:700">● ${esc(c.severity)}</span>
          <span style="font-size:11px;color:#64748B">· ${esc(c.type)}</span>
          ${od>0?`<span style="font-size:10px;background:rgba(239,68,68,0.15);color:#EF4444;border:1px solid rgba(239,68,68,0.3);border-radius:5px;padding:1px 7px;font-weight:700">⚠️ ${od} Overdue</span>`:""}
        </div>
      </div>
      <div style="display:flex;gap:8px;flex-shrink:0">
        <button onclick="exportPDF('${esc(c.id)}')" style="background:linear-gradient(135deg,#1E3A5F,#2563EB);border:none;border-radius:8px;color:#fff;padding:7px 14px;font-size:11px;font-weight:800">📄 PDF</button>
            <button onclick="printSummary('${esc(c.id)}')" style="background:linear-gradient(135deg,#059669,#10B981);border:none;border-radius:8px;color:#fff;padding:7px 14px;font-size:11px;font-weight:800">📋 Summary</button>
        <button onclick="closeCaseModal()" style="background:rgba(255,255,255,0.07);border:none;color:#94A3B8;width:30px;height:30px;border-radius:8px;font-size:16px">✕</button>
      </div>
    </div>
    <div style="display:flex;gap:5px;margin-bottom:20px;flex-wrap:wrap">${tabHtml}</div>
    <div id="tab-content">${content}</div>
  </div>`;
}

function setTab(t){
  selectedTab=t;
  renderCaseModal();
}

function renderTab(c){
  switch(selectedTab){
    case "detail": return renderDetailTab(c);
    case "rca":    return renderRCATab(c);
    case "risk":   return renderRiskTab(c);
    case "timeline": return renderTimelineTab(c);
    case "mitigation": return renderMitigationTab(c);
    case "safetyRec":  return renderSafetyRecTab(c);
    case "lessons":    return renderLessonsTab(c);
    case "phase":      return renderPhaseTab(c);
    case "evidence":   return renderEvidenceTab(c);
    default: return "";
  }
}

  </div>
  <div style="background:rgba(59,130,246,0.06);border:1px solid rgba(59,130,246,0.2);border-radius:10px;padding:16px;margin-bottom:14px">

    ${c.riskArea?`<div style="font-size:12px;color:#3B82F6;font-weight:700;margin-bottom:10px;padding:6px 10px;background:rgba(59,130,246,0.12);border-radius:6px">✓ [${esc(c.riskArea)}] ${esc(GADP_AREAS.find(a=>a.code===c.riskArea)?.label||"")}</div>`:""}

  const rca=c.rca||{};

    cfHtml+=`<div style="display:grid;grid-template-columns:150px 1fr auto;gap:8px;align-items:start;margin-bottom:8px">
      <select onchange="updateRCAFactor('${esc(c.id)}','${f.id}','category',this.value)" style="font-size:12px">${cats.map(ct=>`<option${ct===f.category?" selected":""}>${ct}</option>`).join("")}</select>
      <input value="${esc(f.description)}" placeholder="Deskripsi faktor..." onchange="updateRCAFactor('${esc(c.id)}','${f.id}','description',this.value)" style="font-size:12px">
      <button onclick="deleteRCAFactor('${esc(c.id)}','${f.id}')" style="background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:6px;color:#EF4444;padding:7px 10px;font-size:12px">×</button>
    </div>`;
  });
  return `
  <div style="background:rgba(239,68,68,0.05);border:1px solid rgba(239,68,68,0.2);border-radius:12px;padding:16px;margin-bottom:14px">
    <div class="section-title">⚡ Immediate Cause</div>
    <textarea rows="3" placeholder="Penyebab langsung kejadian..." onchange="updateRCAField('${esc(c.id)}','immediateCause',this.value)">${esc(rca.immediateCause||"")}</textarea>
  </div>
  <div style="background:rgba(245,158,11,0.05);border:1px solid rgba(245,158,11,0.2);border-radius:12px;padding:16px;margin-bottom:14px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div class="section-title" style="margin-bottom:0">🔗 Contributing Factors</div>
      <button onclick="addRCAFactor('${esc(c.id)}')" style="background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.3);border-radius:7px;color:#F59E0B;padding:5px 12px;font-size:11px;font-weight:700">+ Tambah</button>
    </div>
    ${cfHtml||`<div style="color:#475569;font-size:12px;text-align:center;padding:10px 0">Belum ada contributing factor.</div>`}
  </div>
  <div style="background:rgba(139,92,246,0.05);border:1px solid rgba(139,92,246,0.2);border-radius:12px;padding:16px">
    <div class="section-title">🔍 Root Cause</div>
    <textarea rows="3" placeholder="Akar penyebab utama..." onchange="updateRCAField('${esc(c.id)}','rootCause',this.value)" style="margin-bottom:10px">${esc(rca.rootCause||"")}</textarea>
    <div style="font-size:10px;color:#64748B;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px">HFACS / Analysis Notes</div>
    <textarea rows="2" placeholder="Catatan analisis HFACS, Swiss Cheese Model..." onchange="updateRCAField('${esc(c.id)}','analysisNotes',this.value)">${esc(rca.analysisNotes||"")}</textarea>
  </div>`;
}
function updateRCAField(caseId,key,val){
  const c=getCase(caseId); if(!c)return;
  updateCase(caseId,{rca:{...(c.rca||{}),[key]:val}});
}
function updateRCAFactor(caseId,fid,key,val){
  const c=getCase(caseId); if(!c)return;
  const factors=(c.rca?.contributingFactors||[]).map(f=>f.id===fid?{...f,[key]:val}:f);
  updateCase(caseId,{rca:{...(c.rca||{}),contributingFactors:factors}});
}
function addRCAFactor(caseId){
  const c=getCase(caseId); if(!c)return;
  const factors=[...(c.rca?.contributingFactors||[]),{id:genUid(),category:"Human Factors",description:""}];
  updateCase(caseId,{rca:{...(c.rca||{}),contributingFactors:factors}});
  setTab("rca");
}
function deleteRCAFactor(caseId,fid){
  const c=getCase(caseId); if(!c)return;
  const factors=(c.rca?.contributingFactors||[]).filter(f=>f.id!==fid);
  updateCase(caseId,{rca:{...(c.rca||{}),contributingFactors:factors}});
  setTab("rca");
}

// ── Risk / ERC Tab ────────────────────────────
function renderRiskTab(c){
  const risk=c.risk||{};
  const rIdx=risk.riskIdx??null;
  const bIdx=risk.barrierIdx??null;
  const score=rIdx!==null&&bIdx!==null?ERC_MATRIX[rIdx][bIdx]:null;
  const si=score?ercColor(score):null;
  const displayRows=[3,2,1,0];

  // Matrix
  let matHtml=`<div style="overflow-x:auto"><table style="border-collapse:separate;border-spacing:4px;width:100%"><thead><tr>
    <td colspan="2" style="padding:6px 10px 10px;font-size:10px;font-style:italic;color:#64748B"><b style="color:#3B82F6;font-style:normal">Q2</b> — Effectiveness of remaining barriers?</td>
    ${ERC_BARRIERS.map((b,i)=>`<th style="padding:8px;text-align:center;min-width:80px;vertical-align:bottom">
      <div style="font-size:11px;font-weight:800;color:${bIdx===i?"#F59E0B":"#94A3B8"};background:${bIdx===i?"rgba(245,158,11,0.12)":"rgba(255,255,255,0.04)"};border-radius:8px;padding:5px 6px;border:${bIdx===i?"1px solid rgba(245,158,11,0.3)":"1px solid rgba(255,255,255,0.06)"}">${b}</div>
      <div style="font-size:9px;color:#475569;margin-top:3px;line-height:1.3">${ERC_BARRIER_DESC[i]}</div>
    </th>`).join("")}
  </tr></thead><tbody>`;

  displayRows.forEach((rowIdx,dispIdx)=>{
    matHtml+=`<tr>`;
    if(dispIdx===0){
      matHtml+=`<td rowspan="4" style="vertical-align:middle;padding:0 6px 0 0;width:14px">
        <div style="writing-mode:vertical-rl;transform:rotate(180deg);font-size:9px;font-style:italic;color:#64748B;text-align:center;white-space:nowrap">
          <b style="color:#F59E0B;font-style:normal">Q1</b> — Most credible accident outcome?
        </div>
      </td>`;
    }
    matHtml+=`<td style="padding:5px 8px;vertical-align:middle;min-width:130px">
      <div style="font-size:11px;font-weight:800;color:${rIdx===rowIdx?"#F59E0B":"#E2E8F0"}">${ERC_OUTCOMES[rowIdx]}</div>
      <div style="font-size:9px;color:#475569;margin-top:2px;line-height:1.3">${ERC_OUTCOME_DESC[rowIdx].substring(0,70)}...</div>
    </td>`;
    ERC_BARRIERS.forEach((_,ci)=>{
      const val=ERC_MATRIX[rowIdx][ci];
      const info=ercColor(val);
      const isSel=rIdx===rowIdx&&bIdx===ci;
      const show=rowIdx!==0||ci===0;
      matHtml+=`<td style="padding:3px;text-align:center">
        <div class="erc-cell" onclick="${show?`setERC('${c.id}',${rowIdx},${ci})`:"void(0)"}"
          style="background:${show?(isSel?info.color+"25":info.color+"0E"):"rgba(255,255,255,0.02)"};border:${isSel?`2px solid ${info.color}`:`1px solid ${show?info.color+"30":"rgba(255,255,255,0.04)"}`};transform:${isSel?"scale(1.06)":"scale(1)"};box-shadow:${isSel?`0 0 14px ${info.color}45`:"none"};cursor:${show?"pointer":"default"}">
          ${show?`<div style="font-size:17px;font-weight:900;color:${info.color};font-family:Arial Black,sans-serif">${val}</div><div style="font-size:9px;color:${info.color};opacity:.85;font-weight:700">${info.label}</div>`:`<div style="font-size:11px;color:#334155">—</div>`}
        </div>
      </td>`;
    });
    matHtml+=`</tr>`;
  });
  matHtml+=`</tbody></table></div>`;

  let resultHtml=score?`
  <div style="background:${si.color}15;border:1px solid ${si.color}50;border-radius:12px;padding:18px;margin-bottom:16px">
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:12px">
      <div style="width:56px;height:56px;border-radius:12px;background:${si.color}20;border:2px solid ${si.color};display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <span style="font-size:22px;font-weight:900;color:${si.color};font-family:Arial Black,sans-serif">${score}</span>
      </div>
      <div>
        <div style="font-size:10px;color:#64748B;font-weight:700;text-transform:uppercase;letter-spacing:.8px">ERC Score Result</div>
        <div style="font-size:20px;font-weight:900;color:${si.color};font-family:Arial Black,sans-serif">${si.label}</div>
        <div style="font-size:11px;color:#94A3B8;margin-top:2px">Outcome: <b style="color:#E2E8F0">${ERC_OUTCOMES[rIdx]}</b> · Barriers: <b style="color:#E2E8F0">${ERC_BARRIERS[bIdx]}</b></div>
      </div>
    </div>
    <div style="background:rgba(0,0,0,0.25);border-radius:8px;padding:10px 14px">
      <div style="font-size:10px;font-weight:800;color:${si.color};text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px">Required Action</div>
      <div style="font-size:12px;color:${cPrimary()};line-height:1.6">${si.action}</div>
    </div>
  </div>`:`
  <div style="background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:20px;margin-bottom:16px;text-align:center">
    <div style="font-size:28px;margin-bottom:8px">🎯</div>
    <div style="font-size:13px;color:#64748B;font-weight:600">Click a cell in the matrix to assess the risk level.</div>
  </div>`;

  return `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <div class="section-title" style="margin-bottom:0">ERC Risk Assessment Matrix (4×4)</div>
    <button onclick="toggleERCGuide()" style="background:rgba(59,130,246,0.12);border:1px solid rgba(59,130,246,0.3);border-radius:7px;color:#3B82F6;padding:5px 12px;font-size:11px;font-weight:700">📖 How to Use</button>
  </div>
  <div id="erc-guide" style="display:none;background:rgba(59,130,246,0.05);border:1px solid rgba(59,130,246,0.2);border-radius:12px;padding:16px;margin-bottom:16px;font-size:12px;color:#94A3B8;line-height:1.7">
    <b style="color:#93C5FD">Two-Question Method:</b><br>
    <b style="color:#F59E0B">Q1 (Row)</b> — "If this event had escalated into an accident, what would have been the most credible outcome?" → Select the row.<br>
    <b style="color:#3B82F6">Q2 (Column)</b> — "What was the effectiveness of the remaining barriers?" → Select the column.<br>
    The intersection gives your <b style="color:#E2E8F0">ERC Score</b>. Higher = more urgent action needed.<br>
    Source: ERC Application Guide v4.1, March 2010.
  </div>
  <div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:16px;margin-bottom:16px">${matHtml}</div>
  ${resultHtml}
  <div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:16px">
    <div class="section-title">Assessment Notes</div>
    <textarea rows="3" placeholder="Document your justification..." onchange="updateRiskNotes('${esc(c.id)}',this.value)">${esc((c.risk||{}).notes||"")}</textarea>
  </div>`;
}
function toggleERCGuide(){
  const g=document.getElementById("erc-guide");
  if(g) g.style.display=g.style.display==="none"?"block":"none";
}
function setERC(caseId,ri,bi){
  const c=getCase(caseId); if(!c)return;
  updateCase(caseId,{risk:{...(c.risk||{}),riskIdx:ri,barrierIdx:bi}});
  setTab("risk");
}
function updateRiskNotes(caseId,val){
  const c=getCase(caseId); if(!c)return;
  updateCase(caseId,{risk:{...(c.risk||{}),notes:val}});
}

// ── Timeline Tab ──────────────────────────────
function renderTimelineTab(c){
  const TYP={Event:"#3B82F6",Warning:"#F59E0B",Critical:"#EF4444",Action:"#10B981",Communication:"#8B5CF6"};
  const evs=c.timeline||[];
  let evHtml="";
  if(evs.length===0){
    evHtml=`<div style="text-align:center;color:#475569;padding:20px 0;font-size:13px">Belum ada kronologi.</div>`;
  } else {
    evHtml=`<div style="position:relative"><div class="timeline-line"></div>`;
    evs.forEach((e,i)=>{
      const col=TYP[e.type]||"#3B82F6";
      evHtml+=`<div style="display:flex;gap:16px;margin-bottom:12px;position:relative">
        <div style="width:42px;flex-shrink:0;display:flex;justify-content:center">
          <div style="width:14px;height:14px;border-radius:50%;background:${col};border:2px solid #0D1526;z-index:1;flex-shrink:0;margin-top:4px"></div>
        </div>
        <div style="flex:1;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px">
          <span style="font-size:11px;font-family:'DM Mono',monospace;color:${col};font-weight:700;min-width:70px">${esc(e.time)}</span>
          <span style="flex:1;font-size:13px;color:${cPrimary()}">${esc(e.description)}</span>
          <span style="font-size:10px;background:${col}18;color:${col};border-radius:5px;padding:2px 7px;font-weight:700">${esc(e.type)}</span>
          <button onclick="deleteTimelineEvent('${esc(c.id)}','${e.id}')" style="background:none;border:none;color:#EF4444;font-size:14px;padding:0 4px">×</button>
        </div>
      </div>`;
    });
    evHtml+=`</div>`;
  }
  return `
  <div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:16px;margin-bottom:20px">
    <div class="section-title">Tambah Kronologi Kejadian</div>
    <div style="display:grid;grid-template-columns:140px 1fr 100px;gap:8px;margin-bottom:8px">
      <div><div style="font-size:10px;color:#64748B;font-weight:700;text-transform:uppercase;margin-bottom:4px">Waktu (HH:MM UTC)</div><input id="tl-time" placeholder="08:35 UTC"></div>
      <div><div style="font-size:10px;color:#64748B;font-weight:700;text-transform:uppercase;margin-bottom:4px">Deskripsi</div><input id="tl-desc" placeholder="Deskripsi kejadian..."></div>
      <div><div style="font-size:10px;color:#64748B;font-weight:700;text-transform:uppercase;margin-bottom:4px">Tipe</div>
        <select id="tl-type">${Object.keys(TYP).map(t=>`<option>${t}</option>`).join("")}</select>
      </div>
    </div>
    <button onclick="addTimelineEvent('${esc(c.id)}')" style="background:linear-gradient(135deg,#3B82F6,#8B5CF6);border:none;border-radius:8px;color:#fff;padding:8px 18px;font-size:12px;font-weight:800">+ Tambah Event</button>
  </div>
  ${evHtml}`;
}
function addTimelineEvent(caseId){
  const time=document.getElementById("tl-time")?.value||"";
  const desc=document.getElementById("tl-desc")?.value||"";
  const type=document.getElementById("tl-type")?.value||"Event";
  if(!time.trim()||!desc.trim()){alert("Waktu dan deskripsi wajib diisi.");return;}
  const c=getCase(caseId);if(!c)return;
  const evs=[...(c.timeline||[]),{id:genUid(),time,description:desc,type}].sort((a,b)=>a.time.localeCompare(b.time));
  updateCase(caseId,{timeline:evs});
  setTab("timeline");
}
function deleteTimelineEvent(caseId,eid){
  const c=getCase(caseId);if(!c)return;
  updateCase(caseId,{timeline:(c.timeline||[]).filter(e=>e.id!==eid)});
  setTab("timeline");
}

// ── Mitigation Tab ────────────────────────────
function renderMitigationTab(c){
  const mits=c.mitigations||[];
  let listHtml="";
  if(mits.length===0){
    listHtml=`<div style="text-align:center;color:#475569;padding:20px 0;font-size:13px">Belum ada proposed mitigation.</div>`;
  } else {
    mits.forEach(m=>{
      const cfg=MIT_STATUS[m.status]||MIT_STATUS["Open"];
      const od=isOverdue(m.dueDate)&&m.status!=="Closed";
      listHtml+=`<div style="background:${od?"rgba(239,68,68,0.06)":"rgba(255,255,255,0.03)"};border:1px solid ${od?"rgba(239,68,68,0.3)":"rgba(255,255,255,0.07)"};border-radius:10px;padding:12px 14px;margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px">
          <div style="font-size:13px;color:${cPrimary()};font-weight:600;line-height:1.5;flex:1">${esc(m.action)}</div>
          ${badge(m.status,cfg)}
        </div>
        <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
          <div style="font-size:11px;color:#64748B">🏢 <span style="color:#94A3B8;font-weight:600">${esc(m.unit||"—")}</span></div>
          <div style="font-size:11px;color:${od?"#EF4444":"#64748B"}">📅 <span style="font-weight:600;color:${od?"#EF4444":"#94A3B8"}">${esc(m.dueDate||"—")}${od?" ⚠️ OVERDUE":""}</span></div>
          <div style="margin-left:auto;display:flex;gap:6px">
            <select onchange="updateMitStatus('${esc(c.id)}','${m.id}',this.value)" style="width:auto;padding:3px 8px;font-size:11px">${Object.keys(MIT_STATUS).map(s=>`<option${s===m.status?" selected":""}>${s}</option>`).join("")}</select>
            <button onclick="deleteMit('${esc(c.id)}','${m.id}')" style="background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:6px;color:#EF4444;padding:3px 10px;font-size:11px;font-weight:700">Hapus</button>
          </div>
        </div>
      </div>`;
    });
    // Summary
    const od=mits.filter(m=>m.status!=="Closed"&&isOverdue(m.dueDate)).length;
    listHtml+=`<div style="display:flex;gap:12px;padding:10px 14px;background:rgba(255,255,255,0.02);border-radius:8px;border:1px solid rgba(255,255,255,0.06)">
      ${Object.entries(MIT_STATUS).map(([s,cfg])=>`<div style="font-size:11px;color:${cfg.color};font-weight:700">${s}: ${mits.filter(m=>m.status===s).length}</div>`).join("")}
      ${od>0?`<div style="font-size:11px;color:#EF4444;font-weight:700;margin-left:auto">⚠️ ${od} Overdue</div>`:""}
    </div>`;
  }
  return `
  <div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:16px;margin-bottom:16px">
    <div class="section-title">Tambah Mitigasi Baru</div>
    <textarea id="mit-action" rows="2" placeholder="Proposed mitigation / tindakan korektif..." style="margin-bottom:10px"></textarea>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px">
      <div><div style="font-size:10px;color:#64748B;font-weight:700;text-transform:uppercase;margin-bottom:4px">Unit In Charge</div><input id="mit-unit" placeholder="Ketik nama unit..."></div>
      <div><div style="font-size:10px;color:#64748B;font-weight:700;text-transform:uppercase;margin-bottom:4px">Due Date</div><input id="mit-due" type="date"></div>
      <div><div style="font-size:10px;color:#64748B;font-weight:700;text-transform:uppercase;margin-bottom:4px">Status</div><select id="mit-status">${Object.keys(MIT_STATUS).map(s=>`<option>${s}</option>`).join("")}</select></div>
    </div>
    <button onclick="addMit('${esc(c.id)}')" style="background:linear-gradient(135deg,#F59E0B,#EF4444);border:none;border-radius:8px;color:#fff;padding:8px 18px;font-size:12px;font-weight:800">+ Tambah</button>
  </div>
  ${listHtml}`;
}
function addMit(caseId){
  const action=document.getElementById("mit-action")?.value||"";
  const unit=document.getElementById("mit-unit")?.value||"";
  const dueDate=document.getElementById("mit-due")?.value||"";
  const status=document.getElementById("mit-status")?.value||"Open";
  if(!action.trim()){alert("Deskripsi mitigasi wajib diisi.");return;}
  const c=getCase(caseId);if(!c)return;
  updateCase(caseId,{mitigations:[...(c.mitigations||[]),{id:genUid(),action,unit,dueDate,status}]});
  setTab("mitigation");
}
function updateMitStatus(caseId,mid,val){
  const c=getCase(caseId);if(!c)return;
  updateCase(caseId,{mitigations:(c.mitigations||[]).map(m=>m.id===mid?{...m,status:val}:m)});
}
function deleteMit(caseId,mid){
  if(!confirm("Hapus mitigasi ini?"))return;
  const c=getCase(caseId);if(!c)return;
  updateCase(caseId,{mitigations:(c.mitigations||[]).filter(m=>m.id!==mid)});
  setTab("mitigation");
}

// ── Safety Rec Tab ────────────────────────────
function renderSafetyRecTab(c){
  const recs=c.safetyRecs||[];
  const PRIOS={Urgent:{color:"#EF4444",bg:"rgba(239,68,68,0.15)"},Important:{color:"#F97316",bg:"rgba(249,115,22,0.15)"},Routine:{color:"#22C55E",bg:"rgba(34,197,94,0.15)"}};
  const REC_ST={Open:{color:"#EF4444",bg:"rgba(239,68,68,0.15)"},"In Progress":{color:"#F59E0B",bg:"rgba(245,158,11,0.15)"},Closed:{color:"#10B981",bg:"rgba(16,185,129,0.15)"}};
  let listHtml=recs.length===0?`<div style="text-align:center;color:#475569;padding:20px 0;font-size:13px">Belum ada safety recommendation.</div>`

    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap">
      ${r.refNo?`<span style="font-size:10px;font-family:'DM Mono',monospace;color:#64748B">${esc(r.refNo)}</span>`:""}

    ${r.response?`<div style="font-size:11px;color:#64748B;font-style:italic;margin-bottom:8px">Response: ${esc(r.response)}</div>`:""}
    <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
      ${Object.entries(REC_ST).map(([s,cfg])=>`<button onclick="updateRecStatus('${esc(c.id)}','${r.id}','${s}')" style="background:${r.status===s?cfg.bg:"rgba(255,255,255,0.04)"};border:1px solid ${cfg.color}40;border-radius:6px;color:${cfg.color};padding:4px 10px;font-size:11px;font-weight:700">${s}</button>`).join("")}
      <button onclick="deleteRec('${esc(c.id)}','${r.id}')" style="margin-left:auto;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:6px;color:#EF4444;padding:4px 10px;font-size:11px;font-weight:700">Hapus</button>
    </div>
  </div>`).join("");

  return `
  <div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:16px;margin-bottom:16px">

function toggleEvidenceForm(caseId){
  const wrap=document.getElementById("ev-form-wrap");
  if(!wrap)return;
  const show=wrap.style.display==="none";
  wrap.style.display=show?"block":"none";
  if(show){
    document.getElementById("ev-name")&&document.getElementById("ev-name").focus();
  }
}

function saveEvidence(caseId){
  const type=(document.getElementById("ev-type")||{}).value||"";
  const name=(document.getElementById("ev-name")||{}).value||"";
  const status=(document.getElementById("ev-status")||{}).value||"Diterima";
  const description=(document.getElementById("ev-desc")||{}).value||"";
  const receivedAt=(document.getElementById("ev-date")||{}).value||today();
  const receivedBy=(document.getElementById("ev-by")||{}).value||"";
  if(!type){alert("Pilih jenis evidence terlebih dahulu.");return;}
  if(!name.trim()){alert("Nama/referensi dokumen wajib diisi.");return;}
  const c=getCase(caseId);if(!c)return;
  const entry={type,name:name.trim(),status,description:description.trim(),receivedAt,receivedBy:receivedBy.trim(),addedAt:today()};
  updateCase(caseId,{evidence:[...(c.evidence||[]),entry]});
  setTab("evidence");
}

function deleteEvidence(caseId,idx){
  if(!confirm("Hapus evidence ini?"))return;
  const c=getCase(caseId);if(!c)return;
  const ev=[...(c.evidence||[])];ev.splice(idx,1);
  updateCase(caseId,{evidence:ev});
  setTab("evidence");
}
function deleteCase(caseId){
  if(!confirm("Hapus kasus ini? Data tidak bisa dikembalikan."))return;
  cases=cases.filter(c=>c.id!==caseId);
  saveData();
  deleteFromFirestore(caseId);
  closeCaseModal();
}

function submitForm(isEdit){
  const title=document.getElementById("f-title")?.value?.trim()||"";

    type:document.getElementById("f-type")?.value||"Incident",
    severity:document.getElementById("f-sev")?.value||"Medium",
    flightNo:document.getElementById("f-flt")?.value||"",

    cases=[nc,...cases]; saveCase(nc);
  }
  saveData();
  closeFormModal();
  renderAll();
}

function exportPDF(caseId){
  const c=getCase(caseId);if(!c)return;
  const score=c.risk?.riskIdx!=null&&c.risk?.barrierIdx!=null?ERC_MATRIX[c.risk.riskIdx][c.risk.barrierIdx]:null;
  const ei=score?ercColor(score):null;
  const row=(l,v)=>v?`<tr><td style="padding:7px 12px;font-size:11px;color:#64748B;font-weight:700;text-transform:uppercase;width:160px;border-bottom:1px solid #F1F5F9">${l}</td><td style="padding:7px 12px;font-size:12px;color:#1E293B;border-bottom:1px solid #F1F5F9">${v}</td></tr>`:"";
  const sec=(t,ct,col)=>ct?`<div style="margin-bottom:20px"><div style="font-size:10px;font-weight:800;color:${col||"#1E3A5F"};text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;padding-bottom:4px;border-bottom:2px solid ${col||"#1E3A5F"}30">${t}</div>${ct}</div>`:"";

  const rcaHtml=(c.rca?.immediateCause||c.rca?.rootCause||(c.rca?.contributingFactors||[]).length)?`
    ${c.rca?.immediateCause?`<p style="margin:0 0 8px;font-size:12px"><b>Immediate Cause:</b> ${c.rca.immediateCause}</p>`:""}
    ${(c.rca?.contributingFactors||[]).length?`<p style="margin:0 0 4px;font-size:11px;font-weight:700;color:#64748B">CONTRIBUTING FACTORS:</p><ul style="margin:0 0 8px;padding-left:18px">${(c.rca.contributingFactors||[]).map(f=>`<li style="font-size:12px;margin-bottom:3px"><b>${f.category}:</b> ${f.description}</li>`).join("")}</ul>`:""}
    ${c.rca?.rootCause?`<p style="margin:0;font-size:12px"><b>Root Cause:</b> ${c.rca.rootCause}</p>`:""}`:null;

  const mitHtml=(c.mitigations||[]).length?`<table style="width:100%;border-collapse:collapse;font-size:11px">

    s+='<text x="'+(W/2)+'" y="16" fill="#64748B" font-size="10" font-weight="700" text-anchor="middle">'+title+'</text>';

  } catch(e) {
    console.error("renderTrend error:", e);
    el.innerHTML='<div style="text-align:center;padding:40px 20px;color:#EF4444"><div style="font-size:32px;margin-bottom:10px">⚠️</div><p style="font-size:13px">Terjadi error saat memuat tren: '+e.message+'</p><button class="btn-ghost" onclick="renderTrend()" style="margin-top:12px">🔄 Coba Lagi</button></div>';
  }
}

// ─────────────────────────────────────────────
// RENDER ALL
// ─────────────────────────────────────────────
function renderAll(){
  renderStats();
  if(currentView==="dashboard") renderDashboard();
  else if(currentView==="trend") renderTrend();
  else renderCases();
  checkDueDates();
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
loadData();
setView("dashboard");
startFirestoreSync();
initTheme();
setInterval(function(){checkDueDates();},60000);
</script>
